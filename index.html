<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>osaka-le</title>
  </head>
  <body class="bg-[#1a1008] flex flex-col items-center justify-center min-h-screen overflow-hidden font-serif">

    <div id="scene" class="relative w-screen h-screen cursor-pointer select-none">

      <img id="bg" src="/diosLuna.webp" alt="fondo" 
           class="absolute inset-0 w-full h-full object-cover z-0 origin-center" />

      <div id="doors-clip" class="absolute left-[26%] top-[4.5%] w-[48%] h-[94%] overflow-hidden z-[3]">
        <div id="door-left" class="absolute top-0 left-0 w-1/2 h-full will-change-transform">
          <img src="/puerta.webp" alt="puerta izquierda" class="w-full h-full object-cover object-center block" />
        </div>
        <div id="door-right" class="absolute top-0 right-0 w-1/2 h-full will-change-transform">
          <img src="/puerta.webp" alt="puerta derecha" class="w-full h-full object-cover object-center block" />
        </div>
      </div>

      <img id="wall" src="/puertaabierta.png" alt="marco" 
           class="absolute inset-0 w-full h-full object-cover z-[4] pointer-events-none" />

      <div id="hint" class="absolute bottom-[18px] left-1/2 -translate-x-1/2 z-[10] text-[#c8a96e] text-[13px] tracking-[0.18em] uppercase opacity-85 pointer-events-none whitespace-nowrap">
        <span class="inline-block animate-pulse-slow">✦ &nbsp;Toca para abrir&nbsp; ✦</span>
      </div>

      <button id="reset-btn" class="hidden absolute bottom-[18px] left-1/2 -translate-x-1/2 z-[10] bg-[rgba(20,10,0,0.75)] border border-[#c8a96e] text-[#c8a96e] px-[22px] py-[6px] text-[12px] tracking-[0.2em] uppercase cursor-pointer rounded-[2px] whitespace-nowrap hover:bg-[rgba(200,169,110,0.2)]">
        Cerrar
      </button>

      <!-- Pergamino anclado al fondo del scene 
      <div class="flex items-center absolute bottom-0 left-0 w-full z-20 pointer-events-none">
        <div class="bg-[url(/pergamino1.webp)] bg-contain bg-center bg-no-repeat h-50 w-[500px] flex-shrink-0 z-10 mr-[-570px]"></div>
        <div class="bg-[url(/pergaminoFolio.webp)] bg-cover bg-center bg-no-repeat h-28 flex-1"></div>
        <div class="bg-[url(/rolloDerecho.webp)] bg-contain bg-center bg-no-repeat h-50 w-[500px] flex-shrink-0 z-10 ml-[-565px]"></div>
      </div>-->

    </div>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/puertaInicio.js"></script>
  </body>
</html>
